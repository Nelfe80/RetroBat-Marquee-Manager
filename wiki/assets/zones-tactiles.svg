<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="Segoe UI, Arial, sans-serif">
  <text x="360" y="30" text-anchor="middle" fill="#8a8a9a" font-size="14" font-weight="bold" letter-spacing="1">MODE DUAL PLAYER — ÉCRAN INSTRUCTION CARD TACTILE</text>

  <!-- iccard screen -->
  <rect x="40" y="50" width="640" height="200" rx="10" fill="#10101a" stroke="#3a3a48" stroke-width="3"/>

  <!-- P1 zone 0..50% -->
  <rect x="46" y="56" width="314" height="188" rx="4" fill="#30a0e8" opacity="0.18"/>
  <rect x="46" y="56" width="314" height="188" rx="4" fill="none" stroke="#30a0e8" stroke-width="2"/>
  <text x="160" y="140" text-anchor="middle" fill="#8ecdf5" font-size="22" font-weight="bold">P1</text>
  <text x="160" y="165" text-anchor="middle" fill="#8a8a9a" font-size="11">tap → carte joueur 1</text>
  <text x="160" y="181" text-anchor="middle" fill="#55556a" font-size="10">tap → player 1 card</text>

  <!-- P2 zone 50..100% -->
  <rect x="360" y="56" width="314" height="188" rx="4" fill="#e85c5c" opacity="0.18"/>
  <rect x="360" y="56" width="314" height="188" rx="4" fill="none" stroke="#e85c5c" stroke-width="2"/>
  <text x="560" y="140" text-anchor="middle" fill="#ff9d9d" font-size="22" font-weight="bold">P2</text>
  <text x="560" y="165" text-anchor="middle" fill="#8a8a9a" font-size="11">tap → carte joueur 2</text>
  <text x="560" y="181" text-anchor="middle" fill="#55556a" font-size="10">tap → player 2 card</text>

  <!-- optional center zone -->
  <rect x="303" y="56" width="114" height="188" rx="4" fill="#ffb300" opacity="0.22"/>
  <rect x="303" y="56" width="114" height="188" rx="4" fill="none" stroke="#ffb300" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="360" y="120" text-anchor="middle" fill="#ffd97a" font-size="15" font-weight="bold">IC2</text>
  <text x="360" y="140" text-anchor="middle" fill="#8a8a9a" font-size="10">zone commune</text>
  <text x="360" y="154" text-anchor="middle" fill="#55556a" font-size="10">common zone</text>

  <text x="360" y="280" text-anchor="middle" fill="#8a8a9a" font-size="11">state\surfaces.profile.json — généré par MarqueeManagerSetup / generated by MarqueeManagerSetup</text>
