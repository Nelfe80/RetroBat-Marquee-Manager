name: Deploy wiki

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - "mkdocs.yml"
      - ".github/workflows/wiki.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs-material mkdocs-static-i18n
      - run: mkdocs gh-deploy --force --no-history
