[Settings]
; Version du schéma de configuration.
; Garder à 2 : permet au programme de détecter les anciennes configs et de les migrer.
ConfigVersion=2

; Base WebSocket d'APIExpose.
; MarqueeManager consomme les flux /ws/* à partir de cette adresse.
ApiExposeBaseUrl=ws://127.0.0.1:12345

; true = en navigation rapide, seul le dernier état reçu de chaque flux d'état
; (marquee, topper, iccard, panel, frontend) est traité : l'affichage suit
; toujours la sélection courante. false = retour au traitement historique
; strictement séquentiel (chaque message traité un par un).
CoalesceStateStreams=true

; belownormal (défaut) = le rendu lighting (CPU) ne peut jamais affamer
; EmulationStation ni la chaîne events.ini : sous charge, c'est le marquee
; qui ralentit en premier, jamais le frontend. normal = priorité historique.
ProcessPriority=belownormal

; true = l'application reste discrète dans la zone de notification Windows.
; false = pas d'icône tray.
MinimizeToTray=true

; true = écrit les logs dans LogFilePath.
; Recommandé à true tant que l'intégration DMD/RA est en stabilisation.
; Réactivé pour diagnostiquer la régression d'affichage du score.
LogToFile=true

; Chemin du fichier de log, relatif au dossier MarqueeManager si non absolu.
; Les logs runtime restent dans .log pour ne pas polluer la racine du plugin.
LogFilePath=.log\debug.log

[Screens]
; Ecrans Windows utilisés par les surfaces WPF.
; -1 désactive uniquement la fenêtre WPF de la surface.
; Important : DmdScreen=-1 ne désactive pas le DMD physique.
;
; Les clés *Content indiquent quel flux APIExpose afficher sur chaque surface.
; Valeurs attendues : marquee, topper, iccard, dmd, lcd.

; Surface marquee principale.
MarqueeScreen=2
MarqueeContent=marquee
; Fenêtre positionnée dans l'écran (x,y,largeur,hauteur relatifs au coin haut-gauche).
; Permet plusieurs fenêtres (marquee, iccard...) sur un même écran vertical.
; Absent ou vide = plein écran.
;MarqueeBounds=0,0,1080,270

; Surface topper. Désactivée ici.
TopperScreen=-1
TopperContent=topper

; Surface instruction card / iccard. Désactivée ici.
IcCardScreen=-1
IcCardContent=iccard

; Fenêtre DMD virtuelle WPF. Garder -1 si le DMD physique est utilisé.
DmdScreen=-1
DmdContent=dmd

; Surface LCD additionnelle. Désactivée ici.
LcdScreen=-1
LcdContent=lcd

[DMD]
; Active la pile DMD privée du plugin.
; true = rendu vers DmdDevice*.dll et, pour les vidéos compatibles, dmdext privé.
Enabled=true

; Cible DmdDevice/dmdext.
; Pour ton installation actuelle : zedmd.
; Autres valeurs courantes : zedmdhd, pin2dmd, pindmdv3, virtualdmd.
; Au démarrage, MarqueeManager réécrit tools\dmd\DmdDevice.ini pour activer uniquement ce modèle.
Model=zedmd

; Exécutable dmdext privé au plugin.
; Utilisé uniquement quand un média vidéo compatible doit être transmis tel quel au DMD.
ExePath=tools\dmd\dmdext.exe

; Résolution logique envoyée aux DLL DMD.
; ZeDMD standard : 128x32. ZeDMD HD typique : 256x64.
Width=128
Height=32

; Port série optionnel du ZeDMD.
; Vide = auto-détection par la pile ZeDMD/DmdDevice.
ZeDmdPort=

; true = optimise le ZeDMD avant ouverture de DmdDevice.
; Cette phase reprend la logique historique : HwOpen, calibration, éventuel SaveSettings/Reset, puis DmdDevice.Open.
OptimizeZeDmd=true

; Luminosité ZeDMD.
; -1 = ne pas modifier la valeur firmware actuelle.
; Sinon, valeur supportée par le firmware, généralement 0 à 15.
Brightness=-1

; Taille des paquets USB ZeDMD.
; 0 = auto : 512 pour 128x32, 1024 pour HD.
; L'ancien firmware peut être trop bas par défaut, ce qui provoque balayage/flicker.
UsbPackageSize=0

; Fréquence minimale de refresh panneau.
; 0 = ne pas modifier.
; Exemple avancé : 90.
PanelMinRefreshRate=0

; Temps minimum pendant lequel un bloc DMD reste visible avant qu'un autre bloc
; persistant puisse prendre sa place. Les notifications RA ont leur propre durée.
MinimumBlockDisplayMs=3000

; Systèmes qui prennent eux-mêmes le contrôle du DMD au lancement d'un jeu.
; Sur game-start, MarqueeManager ferme son DMD interne pour laisser la main au pinball.
; Sur game-stop/game-ended ou retour sélection, MarqueeManager reprend le DMD après une courte pause.
ActiveSystemsDMD=fpinball,pinballfx,pinballfx2,pinballfx3,pinballfm,vpinball,zaccariapinball

[DOF]
; Active la lecture des fichiers MAME .lay pour topper/iccard/DMD quand APIExpose expose ces layouts.
Enabled=true

; true = autorise les vues .lay orientées marquee/topper/iccard vers les surfaces WPF.
MarqueeEnabled=true

; true = autorise les frames .lay DMD dans l'arbitrage DMD.
DmdEnabled=true

; Dossier des layouts .lay, relatif à MarqueeManager si non absolu.
Path=resources\dof\mame

[RetroAchievements]
; APIExpose reste l'unique source RetroAchievements.
; MarqueeManager ne contacte pas retroachievements.org et ne télécharge aucun badge.

; Active la consommation de /ws/retroachievements.
; Activé ici pour afficher et alterner le score RA avec le score live sur le DMD.
Enabled=true

; true = affiche l'état RA, notifications et warnings sur le marquee.
MarqueeEnabled=true

; true = envoie la même présentation RA vers le DMD physique.
DmdEnabled=true

; true = affiche un état RA continu quand aucune notification prioritaire n'est active.
PersistentEnabled=true

; true = affiche unlocks, warnings et résultats leaderboard temporaires.
NotificationsEnabled=true

; Interrupteurs par type de contenu RA.
; ModeEnabled affiche le bloc de mode HARDCORE/SOFTCORE/LEADERBOARDS sur le DMD.
; Recommandé à false : en mode leaderboard, le layout speedrun porte déjà l'information utile.
; ScoreEnabled concerne le score/progression RA persistant.
; NotificationsEnabled reste l'interrupteur maître des trois notifications temporaires.
ModeEnabled=false
ScoreEnabled=true
UnlockEnabled=true
WarningEnabled=true
ChallengeEnabled=true
LeaderboardEnabled=true

; Temps de passage du score/progression RA dans la rotation DMD.
ScoreDurationMs=6000

; Durée d'affichage d'un achievement unlock. Pendant ces 6 secondes, un score
; ou un timer ne peut plus écraser la notification.
UnlockDurationMs=6000

; Durée d'affichage d'un warning RA.
WarningDurationMs=5000

; Durée d'affichage d'un résultat leaderboard.
LeaderboardDurationMs=6000

; Défilement speedrun : nombre maximal de changements rank/pseudo par seconde.
; 4 = un nouveau pseudo toutes les 250 ms pendant le speedrun.
SpeedrunUsersPerSecond=4

; true = affiche les badges d'achievements en bas du marquee.
; Badges verrouillés : légèrement visibles en bas. Débloqués : remontent progressivement.
BadgeTrayEnabled=true

; true = plein écran animé (coupe + badge + titre + description + pts) sur un unlock.
; Ignoré si un speedrun leaderboard est actif — ne perturbe pas le chrono.
UnlockTakeoverEnabled=true

; Durée d'affichage du résultat speedrun (temps figé + rank + diff vs record) après submit.
SpeedrunResultDurationMs=5000

[Lighting]
; Moteur de marquee à lumière dynamique (RBMarquee Lighting Engine, Phase 1).
; Chaque marquee reçu est rendu via le pipeline lumineux : version éteinte générée,
; allumage fluorescent, rétroéclairage vivant. L'image simple reste le fallback.
Enabled=true

; true = motif de test shader (validation) à la place du contenu réel.
TestPattern=false

; Limite de FPS de la surface de rendu.
FpsLimit=60

; true = compteur FPS incrusté en haut à gauche de la surface.
ShowFps=false

; Résolution interne de rendu (0.25 à 1.0). Baisser si le CPU ne tient pas 60 FPS.
RenderScale=0.75

; Cadrage : remplit la hauteur de la fenêtre (rogne les côtés, centré) si la perte
; de matière reste sous ce seuil (0 à 0.6). 0 = toujours letterbox haut/bas.
FillHeightMaxCrop=0.30

; Sons des tubes (resources\sounds), synchronisés sur le scintillement :
; ticks courts sur chaque strike, hum/buzz continus suivant le niveau lumineux.
SoundEnabled=true

; Volume maître, plafonné à 0.30 (30%).
SoundVolume=0.30

; Reflet de la vitre du marquee (0 à 0.3). 0 = pas de vitre.
GlassReflection=0.06

; Visibilité du tube physique (resources\lighting\neon_fond_transparent.png)
; derrière la vitre (0 à 0.5). 0 = invisible (recommandé).
TubeVisualOpacity=0

; false = préfère le marquee scrapé réel au generated quand les deux existent.
; true = garde le generated (utile si le scan réel est de mauvaise qualité).
PreferGeneratedMarquee=false

; true = miroir de l'animation lumineuse du marquee sur le DMD physique.
; false recommandé : le DMD affiche le média fourni par le flux (gif animé
; en priorité, sinon dmd generated / logo), plus lumineux et mieux adapté.
DmdMirror=false

[LiveData]
; Overlays temps réel consommés depuis APIExpose.
; /ws/score et /ws/timer serviront aux affichages score/timer sur les surfaces.

; Active la consommation et l'affichage du score live.
ScoreEnabled=true

; Active la consommation et l'affichage du timer live.
TimerEnabled=true

; true = affiche score/timer sur le marquee.
MarqueeEnabled=true

; true = inclut score/timer dans l'arbitrage DMD.
DmdEnabled=true

; Temps de passage de chaque bloc dans la rotation DMD.
; Un changement de score peut aussi réclamer MinimumBlockDisplayMs pour redevenir visible.
ScoreDurationMs=4000
TimerDurationMs=4000
